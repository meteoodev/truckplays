<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Simulation Game</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Basic ground
    const planeGeometry = new THREE.PlaneGeometry(1000, 1000);
    const planeMaterial = new THREE.MeshBasicMaterial({ color: 0x007700, side: THREE.DoubleSide });
    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = Math.PI / 2;
    scene.add(plane);

    // Truck model placeholder
    let truck;
    const truckGeometry = new THREE.BoxGeometry(1, 0.5, 2);
    const truckMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    truck = new THREE.Mesh(truckGeometry, truckMaterial);
    scene.add(truck);

    camera.position.z = 5;
    camera.position.y = 2;

    // Game controls
    let speed = 0;
    let fuel = 100;
    let money = 0;

    window.addEventListener('keydown', function (event) {
        if (event.key === 'w') speed += 0.1;
        if (event.key === 's') speed -= 0.1;
        if (event.key === 'd') truck.rotation.y -= 0.1;
        if (event.key === 'a') truck.rotation.y += 0.1;
    });

    function animate() {
        requestAnimationFrame(animate);
        truck.position.z -= speed;
        speed *= 0.98; // Simulate friction
        renderer.render(scene, camera);

        // Update HUD
        document.getElementById('hud').innerText = `Speed: ${Math.round(speed * 100)} km/h | Fuel: ${fuel} | Money: $${money}`;
    }
    animate();
</script>

<div id="hud" style="position: absolute; top: 10px; left: 10px; color: white; font-family: Arial, sans-serif;"></div>

</body>
</html>
